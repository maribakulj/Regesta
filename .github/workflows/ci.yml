name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref when a new commit lands. Saves CI
# time on rapid pushes; main is excluded so release-relevant runs always
# complete.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Default least-privilege token. Individual jobs raise as needed.
permissions:
  contents: read

jobs:
  test:
    name: Test, lint, format (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: ["21", "24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: "latest"
          clj-kondo: "latest"
          cljfmt: "latest"

      - name: Cache Clojure deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: cljdeps-${{ matrix.java }}-${{ hashFiles('deps.edn') }}
          restore-keys: cljdeps-${{ matrix.java }}-

      - name: Lint (clj-kondo)
        run: clj-kondo --lint src test

      - name: Format check (cljfmt)
        run: cljfmt check src test

      - name: Run tests
        run: clojure -M:test

  junit:
    name: JUnit XML report
    runs-on: ubuntu-latest
    # Runs alongside the test matrix on a single Java slice and produces a
    # JUnit XML that GitHub's check panel can render. We always publish,
    # even on test failure, so the results stay visible — that's the whole
    # point of the JUnit panel.
    needs: test

    permissions:
      contents: read
      checks: write          # required to publish the test result check run
      pull-requests: write   # so the action can comment failing PRs

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: "latest"

      - name: Cache Clojure deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: cljdeps-junit-${{ hashFiles('deps.edn') }}
          restore-keys: cljdeps-junit-

      - name: Run tests with JUnit XML output
        # Exits non-zero on any test failure or error, which marks the
        # job as failed. The publish steps below use if: always() so the
        # XML still surfaces in the run summary.
        run: clojure -M:test/junit

      - name: Upload JUnit XML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml
          path: target/junit/junit.xml
          retention-days: 30
          if-no-files-found: error

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: target/junit/junit.xml
          comment_mode: changes in failures

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    # Coverage runs after the test matrix passes, on a single Java version.
    # Running it on every matrix slice would either upload the same artifact
    # twice or require artifact-name suffixing for no useful gain.
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: "latest"

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: cljdeps-coverage-${{ hashFiles('deps.edn') }}
          restore-keys: cljdeps-coverage-

      - name: Run cloverage
        run: clojure -M:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # cloverage's `--codecov` flag emits target/coverage/codecov.json;
          # the cobertura XML is also produced. Pointing at the directory
          # lets the action pick whichever it prefers.
          directory: target/coverage
          fail_ci_if_error: false
          verbose: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/coverage/
          retention-days: 30
          if-no-files-found: error

      - name: Print coverage summary
        # cloverage prints a per-namespace table to stdout. Mirror it into
        # the run summary so reviewers can see the numbers without
        # downloading the artifact.
        run: |
          if [ -f target/coverage/coverage.txt ]; then
            {
              echo '## Coverage summary'
              echo
              echo '```'
              cat target/coverage/coverage.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
