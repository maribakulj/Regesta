name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref when a new commit lands. Saves CI
# time on rapid pushes; main is excluded so release-relevant runs always
# complete.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Default least-privilege token. Individual jobs raise as needed.
permissions:
  contents: read

jobs:
  test:
    name: Test, lint, format (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: ["21", "24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: "latest"
          clj-kondo: "latest"
          cljfmt: "latest"

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: cljdeps-${{ matrix.java }}-${{ hashFiles('deps.edn') }}
          restore-keys: cljdeps-${{ matrix.java }}-

      - name: Lint (clj-kondo)
        run: clj-kondo --lint src test

      - name: Format check (cljfmt)
        run: cljfmt check src test

      - name: Run tests
        run: clojure -M:test
