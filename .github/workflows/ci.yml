name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test, lint, format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: "latest"
          clj-kondo: "latest"
          cljfmt: "latest"

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: cljdeps-${{ hashFiles('deps.edn') }}
          restore-keys: cljdeps-

      - name: Lint (clj-kondo)
        run: clj-kondo --lint src test

      - name: Format check (cljfmt)
        run: cljfmt check src test

      - name: Run tests
        run: clojure -M:test
